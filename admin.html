<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REIW Admin v0.2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2744;
      --gold: #c4973b;
      --blue: #2554c7;
      --bg: #faf9f7;
      --card: #ffffff;
      --text: #374151;
      --muted: #6b7280;
      --border: #e4ecf4;
      --radius: 8px;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* Page hidden until the role check passes */
    #page { display: none; }

    .site-header {
      background: var(--navy);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
    }

    .site-header .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      font-weight: 900;
      color: #fff;
    }

    .module-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #e2b96a;
      background: rgba(196,151,59,0.15);
      border: 1px solid rgba(196,151,59,0.4);
      border-radius: 4px;
      padding: 2px 8px;
    }

    .vpill { font-size: 11px; color: rgba(255,255,255,0.72); font-weight: 500; }

    .header-right { margin-left: auto; }

    .nav-link {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    .nav-link:hover { color: #fff; }

    .main { max-width: 1020px; margin: 0 auto; padding: 24px 20px 60px; }

    .studio-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.1;
      margin: 2px 0 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 32px;
      text-align: center;
    }

    .card h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 520px;
      margin: 0 auto;
    }

    .card .planned {
      margin-top: 22px;
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .chip {
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      background: #eef2ff;
      border-radius: 999px;
      padding: 5px 12px;
    }

    .version {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 11px;
      color: #c9ccd1;
    }
  </style>
</head>
<body>

<div id="page">
  <div id="reiw-header"></div>
  <script>window.REIW_HEADER = { label:'Admin', version:'v0.2', pageLabel:true };</script>
  <script src="/header.js"></script>

  <div class="main">
    <div class="card">
      <h2>Admin — coming soon</h2>
      <p>Tenant management lives here: creating and inviting users into <span id="tenant-name">your workspace</span>, managing roles, and tenant settings.</p>
      <div class="planned">
        <span class="chip">Users &amp; roles</span>
        <span class="chip">Invitations</span>
        <span class="chip">Tenant settings</span>
        <span class="chip">Billing</span>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://reiw-worker.reiw.app';

// Role gate: must be authed AND owner/admin in the current tenant.
(async function () {
  try {
    const res = await fetch(API + '/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location.href = '/login.html'; return; }
    const data = await res.json();
    const role = data.user && data.user.role;
    if (role !== 'owner' && role !== 'admin') {
      window.location.href = '/dashboard.html';
      return;
    }
    if (data.tenant && data.tenant.name) {
      document.getElementById('tenant-name').textContent = data.tenant.name;
    }
    document.getElementById('page').style.display = 'block';
  } catch (e) {
    window.location.href = '/login.html';
  }
})();
</script>

  <div class="version">admin v0.2</div>
</body>
</html>

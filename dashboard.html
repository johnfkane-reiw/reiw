<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REIW — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2744;
      --navy-hover: #0f1a32;
      --gold: #c4973b;
      --blue: #1a2744;
      --blue-hover: #0f1a32;
      --bg: #faf9f7;
      --card: #ffffff;
      --text: #374151;
      --muted: #6b7280;
      --text-muted: #6b7280;
      --border: #e4e7ec;
      --radius: 8px;
      --locked-bg: #f8f9fa;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ─── Header ─── */
    .header {
      background: var(--navy);
      border-bottom: none;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 0;
      color: #fff;
    }

    .tenant-badge {
      font-size: 12px;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      padding: 4px 10px;
      border-radius: 12px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .user-email { font-weight: 500; color: #fff; }

    .btn-logout {
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: var(--radius);
      padding: 6px 14px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: rgba(255,255,255,0.85);
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-logout:hover { border-color: rgba(255,255,255,0.7); color: #fff; }

    /* ─── Main ─── */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .page-desc {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ─── Module Grid ─── */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .module-card {
      background: var(--card);
      border: 1px solid #e4ecf4;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .module-card:hover:not(.locked) {
      border-color: #e4ecf4;
      box-shadow: 0 8px 28px rgba(16,24,40,0.08);
      transform: translateY(-2px);
    }

    .module-card.locked {
      background: var(--locked-bg);
      cursor: default;
    }

    .module-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
      padding: 3px 9px;
      border-radius: 4px;
    }

    .b-loan{background:#eef2ff;color:#2554c7}
    .b-rental{background:#f0fdfa;color:#0d9488}
    .b-flip{background:#fffbeb;color:#d97706}
    .b-lease{background:#f5f3ff;color:#7c3aed}
    .b-property{background:#fff1f2;color:#be185d}
    .b-payday{background:#f0fdf4;color:#16a34a}

    .module-card.locked .badge { background:#eef0f3; color: var(--muted); }

    .module-status {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .status-live { background: #dcfce7; color: #16a34a; }
    .status-soon { background: #f0f4f8; color: var(--muted); }

    .module-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
    }

    .module-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ─── Account Switcher ─── */
    .switcher-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .switcher-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .switcher-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .switcher-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.15s;
    }

    .switcher-btn:hover { border-color: var(--blue); }

    .switcher-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }

    /* ─── Loading ─── */
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      color: var(--muted);
      font-size: 15px;
    }

    /* ─── Version ─── */
    .version {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 11px;
      color: #ccc;
    }
  </style>
</head>
<body>

<div id="loading" class="loading-screen">Loading…</div>

<div id="app" style="display:none;">
  <div class="header">
    <div class="header-left">
      <svg class="logo-mark" width="28" height="18" viewBox="0 0 56 36" fill="none"><polyline points="2,34 13,8 23,21 34,2 45,15 54,5" stroke="rgba(255,255,255,0.55)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="34,2 45,15 54,5" stroke="#c4973b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="34" cy="2" r="4" fill="#c4973b"/></svg>
      <div class="logo">REIW</div>
      <div class="tenant-badge" id="tenant-name"></div>
    </div>
    <div class="header-right">
      <span class="user-email" id="user-email"></span>
      <span id="user-role"></span>
      <a href="/settings" style="font-size:13px;color:rgba(255,255,255,0.75);text-decoration:none;padding:6px 12px;">Settings</a><button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="page-title">Studios</div>
    <div class="page-desc">Real Estate Investment Tools</div>

    <div class="module-grid" id="module-grid"></div>

    <div id="switcher-section" class="switcher-section" style="display:none;">
      <div class="switcher-title">Switch account</div>
      <div class="switcher-list" id="switcher-list"></div>
    </div>
  </div>
</div>

<div class="version">dashboard v1.6</div>

<script>
const API = 'https://reiw-worker.reiw.app';

const MODULES = [
  { cls: 'b-loan',     tag: 'LOAN',     name: 'Creative Loan Studio', desc: 'Model any loan structure with fine-tuned adjustments and full amortization schedules.', href: '/cfw.html', live: true,  free: true },
  { cls: 'b-rental',   tag: 'RENTAL',   name: 'Rental Studio',        desc: 'Analyze rental properties with 10-year cash flow, tax, and depreciation projections.', href: '/brh.html', live: true,  free: false },
  { cls: 'b-flip',     tag: 'FLIP',     name: 'Flip Studio',          desc: 'Evaluate flips with repair costs, holding costs, and profit analysis.', href: null, live: false, free: false },
  { cls: 'b-lease',    tag: 'LEASE',    name: 'Lease Option Studio',  desc: 'Standard and sandwich lease option deal evaluation.', href: null, live: false, free: false },
  { cls: 'b-property', tag: 'PROPERTY', name: 'Property Studio',      desc: 'Full property-level analysis with line-by-line income, expenses, and valuation.', href: null, live: false, free: false },
  { cls: 'b-payday',   tag: 'PAYDAY',   name: 'Payday Studio',        desc: 'Your financial scorecard, plus ready-to-send offers and contracts.', href: null, live: false, free: false },
];

let currentUser = null;

async function init() {
  try {
    const res = await fetch(API + '/auth/me', { credentials: 'include' });
    if (!res.ok) {
      window.location.href = '/login.html';
      return;
    }
    const data = await res.json();
    currentUser = data;
    render(data);
  } catch (err) {
    window.location.href = '/login.html';
  }
}

function render(data) {
  document.getElementById('tenant-name').textContent = data.tenant.name;
  document.getElementById('user-email').textContent = data.user.email;
  document.getElementById('user-role').textContent = data.user.role;

  const grid = document.getElementById('module-grid');
  grid.innerHTML = '';

  MODULES.forEach(mod => {
    const isFree = data.user.tier === 'free';
    const locked = !mod.live || (isFree && !mod.free);

    const card = document.createElement(locked ? 'div' : 'a');
    card.className = 'module-card' + (locked ? ' locked' : '');
    if (!locked) card.href = mod.href;

    let statusHTML;
    if (mod.live) {
      statusHTML = '<span class="module-status status-live">Live</span>';
    } else {
      statusHTML = '<span class="module-status status-soon">Coming soon</span>';
    }

    card.innerHTML = `
      <div class="module-card-header">
        <span class="badge ${mod.cls}">${mod.tag}</span>
        ${statusHTML}
      </div>
      <div class="module-name">${mod.name}</div>
      <div class="module-desc">${mod.desc}</div>
    `;

    grid.appendChild(card);
  });

  // Account switcher
  if (data.other_tenants && data.other_tenants.length > 0) {
    document.getElementById('switcher-section').style.display = 'block';
    const list = document.getElementById('switcher-list');
    list.innerHTML = '';

    data.other_tenants.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'switcher-btn';
      const color = t.primary_color || '#1a2744';
      const initial = (t.tenant_name || '?')[0].toUpperCase();
      btn.innerHTML = `
        <div class="switcher-icon" style="background:${color}">${initial}</div>
        <span>${t.tenant_name} (${t.role})</span>
      `;
      btn.onclick = () => switchTenant(t.tenant_id);
      list.appendChild(btn);
    });
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

async function switchTenant(tenantId) {
  try {
    const res = await fetch(API + '/auth/switch-tenant', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ tenant_id: tenantId }),
    });
    if (res.ok) {
      window.location.reload();
    }
  } catch (err) {
    console.error('Switch failed:', err);
  }
}

async function logout() {
  try {
    await fetch(API + '/auth/logout', {
      method: 'POST',
      credentials: 'include',
    });
  } catch (err) {
    // continue to redirect even if fetch fails
  }
  window.location.href = '/login.html';
}

init();
</script>

</body>
</html>

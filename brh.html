<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REIW Buy Rent & Hold v2.0</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f6f8;--surface:#fff;--border:#d4d7de;--border-focus:#4a7adb;--text:#1d2028;--text-muted:#5f6672;--accent:#4a7adb;--accent-hover:#3a66c4;--green:#2d8a5e;--green-bg:#e8f5ee;--red:#c44040;--red-bg:#fceaea;--orange:#e08a2e;--orange-bg:#fff5e6;--radius:6px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-size:18px;font-weight:700}.logo span{color:var(--accent)}
.module-tag{font-size:11px;font-weight:600;background:var(--green-bg);color:var(--green);padding:3px 8px;border-radius:10px}
.vpill{font-size:11px;color:var(--text-muted)}
.nav-link{font-size:13px;color:var(--text-muted);text-decoration:none;padding:6px 12px;border-radius:var(--radius)}
.nav-link:hover{background:var(--bg)}
.main{max-width:1100px;margin:0 auto;padding:20px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.section-header{padding:10px 16px;font-weight:600;font-size:13px;border-bottom:1px solid var(--border);background:#fafbfc;border-radius:var(--radius) var(--radius) 0 0}
.section-body{padding:16px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:500;color:var(--text-muted)}
.form-group input,.form-group select{padding:7px 10px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;background:#fff}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--border-focus)}
.loan-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.loan-bar input{flex:1;padding:8px 12px;font-size:15px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit}
.loan-bar.modified input{border-color:var(--orange);background:var(--orange-bg)}
.modified-tag{font-size:12px;font-weight:600;color:var(--orange)}
.btn{padding:8px 18px;font-size:13px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent-hover)}
.btn-sm{padding:6px 14px;font-size:12px}
.status-bar{padding:8px 16px;font-size:13px;border-radius:var(--radius);margin-bottom:8px;display:none}
.status-bar.ok{display:block;background:var(--green-bg);color:var(--green)}
.status-bar.error{display:block;background:var(--red-bg);color:var(--red)}
#undoArea{margin-bottom:12px}
.undo-link{color:var(--accent);cursor:pointer;font-size:13px}.undo-link:hover{text-decoration:underline}
.schedule-wrap{overflow-x:auto}
.schedule{width:100%;border-collapse:collapse;font-size:12px}
.schedule th{background:#f0f1f4;padding:6px 8px;text-align:right;font-weight:600;white-space:nowrap;border:1px solid var(--border);position:sticky;top:0}
.schedule th:first-child{text-align:center}
.schedule td{padding:5px 8px;text-align:right;border:1px solid #e8e9ec;white-space:nowrap}
.schedule td:first-child{text-align:center;font-weight:600;background:#fafbfc}
.schedule tr:hover td{background:#f8f9fb}
.negative{color:var(--red)}.pct{color:var(--accent)}.subtotal{font-weight:600;background:#f5f6f8}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border)}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-muted)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.linked-loan-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:#fafbfc;margin-bottom:6px}
.linked-loan-row .loan-info{flex:1}
.linked-loan-row .loan-name{font-weight:600;font-size:14px}
.linked-loan-row .loan-meta{font-size:12px;color:var(--text-muted)}
.remove-loan{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:10px;padding:24px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.load-search{width:100%;padding:8px 10px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;font-family:inherit}
.load-list{max-height:300px;overflow-y:auto}
.load-row{padding:10px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.load-row:hover{border-color:var(--accent);background:#f8f9ff}
.load-row .loan-name{font-weight:600;font-size:14px}
.load-row .loan-meta{font-size:12px;color:var(--text-muted)}
.delete-btn{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px}
.version{position:fixed;bottom:8px;right:12px;font-size:11px;color:#ccc}
  </style>
</head>
<body>
<div class="header"><div class="header-left"><div class="logo">REIW<span>.</span></div><span class="module-tag">BRH</span><span class="vpill">Buy Rent &amp; Hold v2.0</span></div><div><a href="/dashboard" class="nav-link">Dashboard</a></div></div>
<div class="main">
  <div class="loan-bar" id="loanBar"><input type="text" id="analysisName" placeholder="Analysis name"><span class="modified-tag" id="modifiedTag" style="display:none">Modified</span><button class="btn btn-accent" onclick="clickSave()">Save</button><button class="btn" onclick="clickNew()">New</button><button class="btn" onclick="showLoadModal()">Load</button></div>
  <div id="statusBar" class="status-bar"></div><div id="undoArea"></div>
  <div class="section"><div class="section-header">Property Information</div><div class="section-body"><div class="form-grid">
    <div class="form-group"><label>Purchase Price</label><input type="text" id="purchasePrice" oninput="markDirty()"></div>
    <div class="form-group"><label>Down Payment</label><input type="text" id="downPayment" oninput="markDirty()"></div>
    <div class="form-group"><label>Closing Costs</label><input type="text" id="closingCosts" oninput="markDirty()"></div>
    <div class="form-group"><label>Market Value</label><input type="text" id="marketValue" oninput="markDirty()"></div>
    <div class="form-group"><label>Amount Depreciable</label><input type="text" id="amountDepreciable" oninput="markDirty()"></div>
    <div class="form-group"><label>Analysis Date (Closing)</label><input type="date" id="analysisDate" onchange="markDirty()"></div>
    <div class="form-group"><label>Property Type</label><select id="propertyType" onchange="el('depYears').value=this.value==='commercial'?'39':'27.5';markDirty()"><option value="residential">Residential</option><option value="commercial">Commercial</option></select></div>
    <div class="form-group"><label>Depreciation Years</label><input type="text" id="depYears" oninput="markDirty()"></div>
  </div></div></div>
  <div class="section"><div class="section-header">Income</div><div class="section-body"><div class="form-grid">
    <div class="form-group"><label>Monthly Rental Income</label><input type="text" id="rentalIncome" oninput="markDirty()"></div>
    <div class="form-group"><label>Monthly Other Income</label><input type="text" id="otherIncome" oninput="markDirty()"></div>
    <div class="form-group"><label>Annual Rental Increase %</label><input type="text" id="rentalIncrease" oninput="markDirty()"></div>
  </div></div></div>
  <div class="section"><div class="section-header">Operating Expenses</div><div class="section-body"><div class="form-grid" style="grid-template-columns:1fr 1fr">
    <div class="form-group"><label>Monthly Operating Expenses</label><input type="text" id="monthlyExpenses" oninput="markDirty()"></div>
    <div class="form-group"><label>Annual Expense Increase %</label><input type="text" id="expenseIncrease" oninput="markDirty()"></div>
  </div></div></div>
  <div class="section"><div class="section-header">Financing &amp; Tax Assumptions</div><div class="section-body"><div class="form-grid">
    <div class="form-group"><label>Vacancy %</label><input type="text" id="vacancy" oninput="markDirty()"></div>
    <div class="form-group"><label>First Year Vacancy %</label><input type="text" id="firstYearVacancy" oninput="markDirty()"></div>
    <div class="form-group"><label>Marginal Tax Rate %</label><input type="text" id="marginalRate" oninput="markDirty()"></div>
    <div class="form-group"><label>Cash-on-Cash Based On</label><select id="cocMethod" onchange="markDirty()"><option value="downPayment">Down Payment Only</option><option value="totalCash">Total Initial Cash</option></select></div>
  </div></div></div>
  <div class="section"><div class="section-header">Capital Improvements</div><div class="section-body"><div class="form-grid">
    <div class="form-group"><label>First Year CI</label><input type="text" id="firstYearCI" oninput="markDirty()"></div>
    <div class="form-group"><label>Annual Ongoing CI</label><input type="text" id="ongoingCI" oninput="markDirty()"></div>
    <div class="form-group"><label>Annual CI Increase %</label><input type="text" id="ciIncrease" oninput="markDirty()"></div>
  </div></div></div>
  <div class="section"><div class="section-header">Debt Service</div><div class="section-body">
    <div id="linkedLoansArea"><p style="color:var(--text-muted);font-size:13px">No loans linked. Attach a loan to pull year-by-year debt service.</p></div>
    <div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-sm" onclick="showLoanPicker()">Attach Loan</button><a href="/cfw" class="btn btn-sm" style="text-decoration:none;display:inline-block">Create New Loan</a></div>
  </div></div>
  <div style="margin-bottom:16px;display:flex;gap:10px"><button class="btn btn-accent" onclick="calculate()">Calculate</button><button class="btn" id="btnPdf" onclick="createPDF()" style="display:none">Create PDF</button></div>
  <div id="outputArea" style="display:none">
    <div class="tab-bar"><div class="tab active" onclick="showTab('cfa',this)">Cash Flow</div><div class="tab" onclick="showTab('tia',this)">Tax Impact</div><div class="tab" onclick="showTab('dep',this)">Depreciation</div></div>
    <div id="tab-cfa" class="section" style="border-top:none;border-radius:0 0 var(--radius) var(--radius)"><div class="section-body"><div class="schedule-wrap"><table class="schedule" id="cfaTable"></table></div></div></div>
    <div id="tab-tia" class="section" style="display:none;border-top:none"><div class="section-body"><div class="schedule-wrap"><table class="schedule" id="tiaTable"></table></div></div></div>
    <div id="tab-dep" class="section" style="display:none;border-top:none"><div class="section-body"><div class="schedule-wrap"><table class="schedule" id="depTable"></table></div></div></div>
  </div>
</div>
<div id="modalRoot"></div>
<div class="version">brh v2.0</div>
<script>
const API='https://reiw-worker.reiw.app',MODULE_TYPE='brh';
let currentAnalysis={id:null,name:'',data:{}},savedSnapshot=null,lastLoadedId=null,cachedAnalyses=[],linkedLoans=[],results=null,yearlyDebt=[];
(async function(){try{const r=await fetch(API+'/auth/me',{credentials:'include'});if(!r.ok)throw 0}catch{window.location.href='/login.html'}})();
function el(id){return document.getElementById(id)}
function parseNum(s){if(!s||typeof s==='number')return s||0;return parseFloat(String(s).replace(/[,$\s]/g,''))||0}
function fmt(n){if(n==null)return'—';return Math.round(n).toLocaleString('en-US')}
function fmtD(n){return'$'+fmt(Math.abs(n))}
function fmtPct(n){if(n==='Infinite')return'∞';return(n*100).toFixed(2)+'%'}
function showStatus(t,m){el('statusBar').className='status-bar '+t;el('statusBar').textContent=m}
function clearStatus(){el('statusBar').className='status-bar'}
function closeModal(){el('modalRoot').innerHTML=''}
function markDirty(){if(!savedSnapshot)return;if(JSON.stringify(readInputs())!==savedSnapshot){el('loanBar').classList.add('modified');el('modifiedTag').style.display=''}else{el('loanBar').classList.remove('modified');el('modifiedTag').style.display='none'}}

// Loan engine
function computePeriodicRate(ar,cp,ppy){if(ar===0)return 0;return Math.pow(1+(ar/100)/cp,cp/ppy)-1}
function round2(n){return Math.round(n*100)/100}
function expandAdjustments(adjs,total){const m=new Map();for(const a of adjs){const to=Math.min(a.periodTo!=null?a.periodTo:a.periodFrom,total);for(let p=a.periodFrom;p<=to;p++){const e=m.get(p)||{rate:null,payment:null,extraPrincipal:null};if(a.rate!=null)e.rate=a.rate;if(a.payment!=null)e.payment=a.payment;if(a.extraPrincipal!=null)e.extraPrincipal=a.extraPrincipal;m.set(p,e)}}return m}
function getDateStep(ppy){switch(ppy){case 1:return{months:12};case 2:return{months:6};case 4:return{months:3};case 12:return{months:1};case 26:return{days:14};case 52:return{days:7};default:return{months:1}}}
function advanceDate(d,s){const n=new Date(d);if(s.months)n.setMonth(n.getMonth()+s.months);else if(s.days)n.setDate(n.getDate()+s.days);return n}
function generateSchedule(def){const b=def.base,ppy=b.paymentsPerYear||12,cp=b.compoundingPeriodsPerYear||ppy;const totalP=Math.round((b.termYears||30)*ppy),am=expandAdjustments(def.adjustments||[],totalP);let curDate=b.startDate?new Date(b.startDate+'T00:00:00'):null;let bStop=(b.balloon&&b.balloonDate)?new Date(b.balloonDate+'T00:00:00').getTime():null;let bal=b.principal;const ds=getDateStep(ppy),sched=[];const basePmt=b.interestOnly?bal*computePeriodicRate(b.annualRate,cp,ppy):b.payment;for(let per=1;per<=totalP;per++){if(bal<=0.005)break;const beg=round2(bal);const adj=am.get(per);const pRate=(adj&&adj.rate!=null)?adj.rate:b.annualRate;const pExtra=(adj&&adj.extraPrincipal!=null)?adj.extraPrincipal:0;let pPmt;if(adj&&adj.payment!=null)pPmt=adj.payment;else if(b.interestOnly)pPmt=bal*computePeriodicRate(pRate,cp,ppy);else pPmt=basePmt;const r=computePeriodicRate(pRate,cp,ppy),interest=round2(bal*r);let prin=round2(pPmt-interest),extra=pExtra;let end=round2(bal-prin-extra),balloon=false;const isLast=per===totalP;if((end<=0||(isLast&&end>0&&end<beg))&&prin>=0){prin=round2(beg);extra=0;pPmt=round2(prin+interest);end=0}if(bStop&&curDate){const nd=advanceDate(new Date(curDate),ds);if(nd.getTime()>bStop){balloon=true;pPmt=round2(beg+interest);prin=beg;extra=0;end=0}}sched.push({period:per,date:curDate,principal:round2(prin),interest,endBalance:round2(end)});bal=end;if(curDate)curDate=advanceDate(curDate,ds);if(balloon||end<=0)break}return sched}

function computeYearlyDebt(analysisDateStr){
  if(!linkedLoans.length){yearlyDebt=[];return}
  const aDate=analysisDateStr?new Date(analysisDateStr+'T00:00:00'):new Date();
  const yrs=[];for(let i=0;i<10;i++)yrs.push({principal:0,interest:0});
  for(const loan of linkedLoans){
    const sched=generateSchedule(loan);const ppy=loan.base.paymentsPerYear||12;
    const ls=loan.base.startDate?new Date(loan.base.startDate+'T00:00:00'):aDate;
    const md=(aDate.getFullYear()-ls.getFullYear())*12+(aDate.getMonth()-ls.getMonth());
    const offset=Math.max(0,Math.round(md*ppy/12));
    for(const row of sched){const ap=row.period-offset;if(ap<1)continue;const yr=Math.floor((ap-1)/ppy);if(yr>=10)break;yrs[yr].principal+=row.principal;yrs[yr].interest+=row.interest}
  }
  yearlyDebt=yrs;
}

function readInputs(){return{purchasePrice:parseNum(el('purchasePrice').value),downPayment:parseNum(el('downPayment').value),closingCosts:parseNum(el('closingCosts').value),marketValue:parseNum(el('marketValue').value),amountDepreciable:parseNum(el('amountDepreciable').value),analysisDate:el('analysisDate').value,propertyType:el('propertyType').value,depYears:parseNum(el('depYears').value)||(el('propertyType').value==='commercial'?39:27.5),rentalIncome:parseNum(el('rentalIncome').value),otherIncome:parseNum(el('otherIncome').value),rentalIncrease:parseNum(el('rentalIncrease').value)/100,monthlyExpenses:parseNum(el('monthlyExpenses').value),expenseIncrease:parseNum(el('expenseIncrease').value)/100,vacancy:parseNum(el('vacancy').value)/100,firstYearVacancy:parseNum(el('firstYearVacancy').value)/100,marginalRate:parseNum(el('marginalRate').value)/100,cocMethod:el('cocMethod').value,firstYearCI:parseNum(el('firstYearCI').value),ongoingCI:parseNum(el('ongoingCI').value),ciIncrease:parseNum(el('ciIncrease').value)/100,linkedLoanIds:linkedLoans.map(l=>l.id)}}

function populateUI(inp){el('purchasePrice').value=inp.purchasePrice||'';el('downPayment').value=inp.downPayment||'';el('closingCosts').value=inp.closingCosts||'';el('marketValue').value=inp.marketValue||'';el('amountDepreciable').value=inp.amountDepreciable||'';el('analysisDate').value=inp.analysisDate||'';el('propertyType').value=inp.propertyType||'residential';el('depYears').value=inp.depYears||'';el('rentalIncome').value=inp.rentalIncome||'';el('otherIncome').value=inp.otherIncome||'';el('rentalIncrease').value=inp.rentalIncrease?(inp.rentalIncrease*100):'';el('monthlyExpenses').value=inp.monthlyExpenses||'';el('expenseIncrease').value=inp.expenseIncrease?(inp.expenseIncrease*100):'';el('vacancy').value=inp.vacancy?(inp.vacancy*100):'';el('firstYearVacancy').value=inp.firstYearVacancy?(inp.firstYearVacancy*100):'';el('marginalRate').value=inp.marginalRate?(inp.marginalRate*100):'';el('cocMethod').value=inp.cocMethod||'downPayment';el('firstYearCI').value=inp.firstYearCI||'';el('ongoingCI').value=inp.ongoingCI||'';el('ciIncrease').value=inp.ciIncrease?(inp.ciIncrease*100):''}

function clearUI(){document.querySelectorAll('.form-group input').forEach(i=>i.value='');document.querySelectorAll('.form-group select').forEach(s=>s.selectedIndex=0);el('analysisDate').value=new Date().toISOString().split('T')[0];el('depYears').value='27.5';el('outputArea').style.display='none';el('btnPdf').style.display='none';el('loanBar').classList.remove('modified');el('modifiedTag').style.display='none';linkedLoans=[];yearlyDebt=[];results=null;renderLinkedLoans()}

function calculate(){
  const inp=readInputs(),pp=inp.purchasePrice,depYears=inp.depYears||1;
  const aRent=inp.rentalIncome*12,aOther=inp.otherIncome*12,aExp=inp.monthlyExpenses*12;
  const initCash=inp.cocMethod==='totalCash'?inp.downPayment+inp.closingCosts+inp.firstYearCI:inp.downPayment;
  const startYear=inp.analysisDate?new Date(inp.analysisDate+'T00:00:00').getFullYear():new Date().getFullYear();
  computeYearlyDebt(inp.analysisDate);
  const cfa=[],tia=[],dep=[];let cumCfat=0,cumDep=0,cumTS=0;
  for(let yr=1;yr<=10;yr++){
    const c={},t={},d={},debt=yearlyDebt[yr-1]||{principal:0,interest:0};
    c.calendarYear=startYear+yr-1;
    if(yr===1){c.rentalIncome=aRent;c.otherIncome=aOther;c.expenses=-aExp;c.vacancyRate=inp.vacancy+inp.firstYearVacancy;c.capitalImprovements=-(inp.ongoingCI+inp.firstYearCI)}
    else{const p=cfa[yr-2];c.rentalIncome=p.rentalIncome*(1+inp.rentalIncrease);c.otherIncome=p.otherIncome*(1+inp.rentalIncrease);c.expenses=p.expenses*(1+inp.expenseIncrease);c.vacancyRate=inp.vacancy;c.capitalImprovements=yr===2?-inp.ongoingCI*(1+inp.ciIncrease):cfa[yr-2].capitalImprovements*(1+inp.ciIncrease)}
    c.principal=-debt.principal;c.interest=-debt.interest;
    c.grossIncome=c.rentalIncome+c.otherIncome;c.vacancyAllowance=-c.grossIncome*c.vacancyRate;
    c.grossOperatingIncome=c.grossIncome+c.vacancyAllowance;c.noi=c.grossOperatingIncome+c.expenses;
    c.capRate=pp>0?c.noi/pp:0;c.cfbt=c.noi+c.principal+c.interest+c.capitalImprovements;
    c.coc=initCash>0?c.cfbt/initCash:'Infinite';
    t.noi=c.noi;t.interestExpense=c.interest;t.realPropertyDep=depYears>0?-inp.amountDepreciable/depYears:0;
    t.ciDep=yr===1?(depYears>0?c.capitalImprovements/depYears:0):tia[yr-2].ciDep*(1+inp.ciIncrease);
    t.taxableIncome=t.noi+t.interestExpense+t.realPropertyDep+t.ciDep;t.marginalRate=inp.marginalRate;
    t.taxSavings=inp.marginalRate*-t.taxableIncome;
    c.taxSavings=t.taxSavings;c.cfat=c.cfbt+c.taxSavings;cumCfat+=c.cfat;c.cumCfat=cumCfat;
    d.purchasePrice=pp;d.amountDepreciable=inp.amountDepreciable;d.landValue=pp-inp.amountDepreciable;
    d.realPropertyDep=t.realPropertyDep;d.capitalImprovements=-c.capitalImprovements;d.ciDep=t.ciDep;
    d.totalDep=d.realPropertyDep+d.ciDep;d.taxSavings=-d.totalDep*inp.marginalRate;
    cumDep+=d.totalDep;d.cumDep=cumDep;cumTS+=d.taxSavings;d.cumTaxSavings=cumTS;
    cfa.push(c);tia.push(t);dep.push(d);
  }
  results={cfa,tia,dep};renderCFA(cfa);renderTIA(tia);renderDep(dep);
  el('outputArea').style.display='';el('btnPdf').style.display='';showStatus('ok','10-year analysis complete');
}

function vc(n,cls){if(n==null)return'<td>—</td>';const neg=n<0;const s=neg?'('+fmtD(n)+')':fmtD(n);return'<td class="'+(cls||'')+'">'+(neg?'<span class="negative">'+s+'</span>':s)+'</td>'}
function renderCFA(cfa){let h='<tr><th>Year</th><th>Rental</th><th>Other</th><th>Gross</th><th>Vacancy</th><th>GOI</th><th>Expenses</th><th>NOI</th><th>Cap Rate</th><th>Principal</th><th>Interest</th><th>Cap Impr.</th><th>CFBT</th><th>CoC</th><th>Tax Sav.</th><th>CFAT</th><th>Cum CFAT</th></tr>';let r='';cfa.forEach(c=>{r+='<tr><td>'+c.calendarYear+'</td>'+vc(c.rentalIncome)+vc(c.otherIncome)+vc(c.grossIncome)+vc(c.vacancyAllowance)+vc(c.grossOperatingIncome)+vc(c.expenses)+vc(c.noi,'subtotal')+'<td class="pct">'+fmtPct(c.capRate)+'</td>'+vc(c.principal)+vc(c.interest)+vc(c.capitalImprovements)+vc(c.cfbt,'subtotal')+'<td class="pct">'+fmtPct(c.coc)+'</td>'+vc(c.taxSavings)+vc(c.cfat,'subtotal')+vc(c.cumCfat)+'</tr>'});el('cfaTable').innerHTML=h+r}
function renderTIA(tia){let h='<tr><th>Year</th><th>NOI</th><th>Interest</th><th>Real Prop Dep</th><th>CI Dep</th><th>Taxable Income</th><th>Marg. Rate</th><th>Tax Savings</th></tr>';let r='';tia.forEach((t,i)=>{r+='<tr><td>'+results.cfa[i].calendarYear+'</td>'+vc(t.noi)+vc(t.interestExpense)+vc(t.realPropertyDep)+vc(t.ciDep)+vc(t.taxableIncome)+'<td class="pct">'+fmtPct(t.marginalRate)+'</td>'+vc(t.taxSavings)+'</tr>'});el('tiaTable').innerHTML=h+r}
function renderDep(dep){let h='<tr><th>Year</th><th>Purchase</th><th>Depreciable</th><th>Land</th><th>Real Dep</th><th>Cap Impr.</th><th>CI Dep</th><th>Total Dep</th><th>Tax Sav.</th><th>Cum Dep</th><th>Cum Tax</th></tr>';let r='';dep.forEach((d,i)=>{r+='<tr><td>'+results.cfa[i].calendarYear+'</td>'+vc(d.purchasePrice)+vc(d.amountDepreciable)+vc(d.landValue)+vc(d.realPropertyDep)+vc(d.capitalImprovements)+vc(d.ciDep)+vc(d.totalDep)+vc(d.taxSavings)+vc(d.cumDep)+vc(d.cumTaxSavings)+'</tr>'});el('depTable').innerHTML=h+r}
function showTab(name,tabEl){['cfa','tia','dep'].forEach(t=>el('tab-'+t).style.display=t===name?'':'none');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tabEl.classList.add('active')}

// Linked loans UI
function renderLinkedLoans(){const a=el('linkedLoansArea');if(!linkedLoans.length){a.innerHTML='<p style="color:var(--text-muted);font-size:13px">No loans linked. Attach a loan to pull year-by-year debt service.</p>';return}a.innerHTML=linkedLoans.map((l,i)=>{const b=l.base||{};const m=[b.principal?'$'+fmt(b.principal):'',b.annualRate!=null?b.annualRate+'%':'',b.termYears?b.termYears+'yr':''].filter(Boolean).join(' · ');return'<div class="linked-loan-row"><div class="loan-info"><div class="loan-name">'+l.name+'</div><div class="loan-meta">'+m+'</div></div><button class="remove-loan" onclick="removeLoan('+i+')" title="Remove">×</button></div>'}).join('')}
function removeLoan(i){linkedLoans.splice(i,1);renderLinkedLoans();markDirty()}
async function showLoanPicker(){let loans=[];try{const r=await fetch(API+'/api/loans',{credentials:'include'});if(r.ok){const d=await r.json();loans=d.loans}}catch{}const ex=new Set(linkedLoans.map(l=>l.id));const av=loans.filter(l=>!ex.has(l.id));let body;if(!av.length)body='<div style="color:var(--text-muted);padding:20px;text-align:center">No available loans. <a href="/cfw">Create one.</a></div>';else body='<div class="load-list">'+av.map(l=>{const b=l.base||{};const m=[b.principal?'$'+fmt(b.principal):'',b.annualRate!=null?b.annualRate+'%':'',b.termYears?b.termYears+'yr':''].filter(Boolean).join(' · ');return'<div class="load-row" onclick="attachLoan(\''+l.id+'\')"><div><div class="loan-name">'+l.name+'</div><div class="loan-meta">'+m+'</div></div></div>'}).join('')+'</div>';el('modalRoot').innerHTML='<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>Attach a Loan</h3>'+body+'<div class="modal-actions"><button class="btn btn-sm" onclick="closeModal()">Cancel</button></div></div></div>'}
async function attachLoan(id){closeModal();try{const r=await fetch(API+'/api/loans/'+id,{credentials:'include'});if(!r.ok)return;const loan=await r.json();const ad=el('analysisDate').value;if(loan.base.startDate&&ad&&loan.base.startDate>ad){if(!confirm('This loan starts after your analysis date. Attaching it will change the analysis date to '+loan.base.startDate+'. Continue?'))return;el('analysisDate').value=loan.base.startDate}linkedLoans.push(loan);renderLinkedLoans();markDirty()}catch(e){console.error('Attach failed:',e)}}

// Save/Load (matches CFW pattern)
async function refreshAnalyses(){try{const r=await fetch(API+'/api/analyses?type='+MODULE_TYPE,{credentials:'include'});if(r.ok){const d=await r.json();cachedAnalyses=d.analyses||[]}}catch{}}
function clickSave(){const name=el('analysisName').value.trim();if(!name){el('analysisName').focus();return}if(currentAnalysis.id){el('modalRoot').innerHTML='<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>Save Analysis</h3><p>"'+name+'" already exists. Overwrite it, or save as a new analysis?</p><div class="modal-actions"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm" onclick="doSave(true)">Save as New</button><button class="btn btn-accent btn-sm" onclick="doSave(false)">Overwrite</button></div></div></div>'}else{const ex=cachedAnalyses.find(a=>a.name.toLowerCase()===name.toLowerCase());if(ex){currentAnalysis.id=ex.id;el('modalRoot').innerHTML='<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>Save Analysis</h3><p>"'+name+'" already exists. Overwrite it, or save as a new analysis?</p><div class="modal-actions"><button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm" onclick="doSave(true)">Save as New</button><button class="btn btn-accent btn-sm" onclick="doSave(false)">Overwrite</button></div></div></div>'}else doSave(false)}}
async function doSave(asNew){const name=el('analysisName').value.trim();if(!name)return;const inputs=readInputs();const payload={name,type:MODULE_TYPE,data:{inputs,linkedLoans:linkedLoans.map(l=>({id:l.id,name:l.name,base:l.base,adjustments:l.adjustments})),results}};try{let res;if(currentAnalysis.id&&!asNew){res=await fetch(API+'/api/analyses/'+currentAnalysis.id,{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(payload)})}else{res=await fetch(API+'/api/analyses',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(payload)})}if(!res.ok){showStatus('error','Save failed');return}const result=await res.json();if(!currentAnalysis.id||asNew)currentAnalysis.id=result.id;currentAnalysis.name=name;await refreshAnalyses()}catch{showStatus('error','Could not save.');return}closeModal();const jid=currentAnalysis.id,jname=name;lastLoadedId=jid;currentAnalysis={id:null,name:'',data:{}};savedSnapshot=null;linkedLoans=[];results=null;clearUI();el('analysisName').value='';showStatus('ok','Saved "'+jname+'"');el('undoArea').innerHTML='<span class="undo-link" onclick="undoLoad(\''+jid+'\')">Load "'+jname+'"</span>'}
function clickNew(){const hid=currentAnalysis.id,hn=currentAnalysis.name;currentAnalysis={id:null,name:'',data:{}};savedSnapshot=null;clearUI();el('analysisName').value='';clearStatus();if(hid)el('undoArea').innerHTML='<span class="undo-link" onclick="undoLoad(\''+hid+'\')">Load "'+hn+'"</span>'}
async function showLoadModal(){await refreshAnalyses();const list=cachedAnalyses;let body;if(!list.length)body='<div style="color:var(--text-muted);padding:20px;text-align:center">No saved analyses.</div>';else body='<input class="load-search" placeholder="Search..." oninput="filterLoadList()"><div class="load-list" id="loadList">'+buildLoadRows(list)+'</div>';el('modalRoot').innerHTML='<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>Load Analysis</h3>'+body+'<div class="modal-actions"><button class="btn btn-sm" onclick="closeModal()">Cancel</button></div></div></div>'}
function buildLoadRows(list){return list.map(a=>{const d=a.data?.inputs||{};const m=[d.purchasePrice?'$'+fmt(d.purchasePrice):'',d.rentalIncome?'$'+fmt(d.rentalIncome)+'/mo':''].filter(Boolean).join(' · ');return'<div class="load-row" onclick="doLoad(\''+a.id+'\')" data-name="'+a.name.toLowerCase()+'"><div><div class="loan-name">'+a.name+'</div><div class="loan-meta">'+m+'</div></div><button class="delete-btn" onclick="doDeleteFromModal(\''+a.id+'\',event)">×</button></div>'}).join('')}
function filterLoadList(){const q=(document.querySelector('.load-search')?.value||'').toLowerCase();document.querySelectorAll('.load-row').forEach(r=>r.style.display=r.getAttribute('data-name').includes(q)?'':'none')}
async function doLoad(id){closeModal();const a=cachedAnalyses.find(x=>x.id===id);if(!a||!a.data?.inputs)return;currentAnalysis={id:a.id,name:a.name,data:a.data};el('analysisName').value=a.name;populateUI(a.data.inputs);linkedLoans=a.data.linkedLoans||[];renderLinkedLoans();savedSnapshot=JSON.stringify(readInputs());el('loanBar').classList.remove('modified');el('modifiedTag').style.display='none';lastLoadedId=id;calculate();showStatus('ok','Loaded "'+a.name+'"');el('undoArea').innerHTML=''}
function undoLoad(id){doLoad(id)}
async function doDeleteFromModal(id,e){e.stopPropagation();try{await fetch(API+'/api/analyses/'+id,{method:'DELETE',credentials:'include'});await refreshAnalyses()}catch{}if(currentAnalysis.id===id){currentAnalysis={id:null,name:'',data:{}};savedSnapshot=null}const list=el('loadList');if(list)list.innerHTML=cachedAnalyses.length?buildLoadRows(cachedAnalyses):'<div style="color:var(--text-muted);padding:20px;text-align:center">No saved analyses.</div>'}

// PDF
function createPDF(){if(!results)return;const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'letter'});const name=el('analysisName').value||'Buy Rent & Hold Analysis';const aDate=el('analysisDate').value||'';doc.setFontSize(16);doc.text(name,14,14);doc.setFontSize(10);doc.setTextColor(100);doc.text('Analysis Date: '+aDate+'  |  REIW Buy Rent & Hold',14,20);doc.setTextColor(0);doc.setFontSize(12);doc.text('Cash Flow Analysis',14,28);doc.autoTable({startY:30,margin:{left:8,right:8},styles:{fontSize:7,cellPadding:1.5},headStyles:{fillColor:[74,122,219]},head:[['Year','Rental','Other','Gross','Vacancy','GOI','Exp.','NOI','Cap Rate','Prin.','Int.','CI','CFBT','CoC','Tax','CFAT','Cum']],body:results.cfa.map(c=>[c.calendarYear,fmtD(c.rentalIncome),fmtD(c.otherIncome),fmtD(c.grossIncome),fmtD(c.vacancyAllowance),fmtD(c.grossOperatingIncome),fmtD(c.expenses),fmtD(c.noi),fmtPct(c.capRate),fmtD(c.principal),fmtD(c.interest),fmtD(c.capitalImprovements),fmtD(c.cfbt),fmtPct(c.coc),fmtD(c.taxSavings),fmtD(c.cfat),fmtD(c.cumCfat)])});doc.addPage();doc.setFontSize(12);doc.text('Tax Impact Analysis',14,14);doc.autoTable({startY:18,margin:{left:14,right:14},styles:{fontSize:8,cellPadding:2},headStyles:{fillColor:[74,122,219]},head:[['Year','NOI','Interest','Real Dep.','CI Dep.','Taxable','Rate','Tax Sav.']],body:results.tia.map((t,i)=>[results.cfa[i].calendarYear,fmtD(t.noi),fmtD(t.interestExpense),fmtD(t.realPropertyDep),fmtD(t.ciDep),fmtD(t.taxableIncome),fmtPct(t.marginalRate),fmtD(t.taxSavings)])});doc.addPage();doc.setFontSize(12);doc.text('Depreciation Schedule',14,14);doc.autoTable({startY:18,margin:{left:14,right:14},styles:{fontSize:8,cellPadding:2},headStyles:{fillColor:[74,122,219]},head:[['Year','Purchase','Depr.','Land','Real Dep.','CI','CI Dep.','Total','Tax Sav.','Cum Dep.','Cum Tax']],body:results.dep.map((d,i)=>[results.cfa[i].calendarYear,fmtD(d.purchasePrice),fmtD(d.amountDepreciable),fmtD(d.landValue),fmtD(d.realPropertyDep),fmtD(d.capitalImprovements),fmtD(d.ciDep),fmtD(d.totalDep),fmtD(d.taxSavings),fmtD(d.cumDep),fmtD(d.cumTaxSavings)])});const b64=doc.output('datauristring').split(',')[1];const fn=name.replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'_')+'.pdf';const form=document.createElement('form');form.method='POST';form.action=API+'/pdf/'+encodeURIComponent(fn);form.target='_blank';const inp=document.createElement('input');inp.type='hidden';inp.name='pdf';inp.value=b64;form.appendChild(inp);document.body.appendChild(form);form.submit();document.body.removeChild(form)}

// Init
el('analysisDate').value=new Date().toISOString().split('T')[0];el('depYears').value='27.5';refreshAnalyses();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REIW — Pricing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#1a2744;--navy-hover:#0f1a32;--blue:#2554c7;--gold:#c4973b;--bg:#faf9f7;--surface:#fff;--text:#374151;--muted:#6b7280}
    body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100dvh;display:flex;flex-direction:column}
    a{text-decoration:none;color:inherit}
    .nav{display:flex;align-items:center;justify-content:space-between;height:66px;padding:0 60px;background:var(--surface);border-bottom:1px solid #ece9e3}
    .brand{display:flex;align-items:center;gap:13px}
    .brand .word{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:900;color:var(--navy);letter-spacing:-.015em}
    .nav-right{display:flex;align-items:center;gap:36px}
    .nav-link{font-size:14px;font-weight:500;color:var(--text)}
    .nav-link:hover{color:var(--navy)}
    .nav-div{width:1px;height:18px;background:#e4e4e8}
    .nav-signin{font-size:14px;font-weight:500;color:var(--muted)}
    .nav-signin:hover{color:var(--navy)}
    .btn-primary-nav{background:var(--navy);color:#fff;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:600}
    .btn-primary-nav:hover{background:var(--navy-hover)}
    .ph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:96px 24px}
    .eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
    .ph-title{font-family:'Playfair Display',Georgia,serif;font-size:52px;font-weight:900;color:var(--navy);letter-spacing:-.02em;line-height:1.08;margin-bottom:18px}
    .ph-desc{font-size:17px;color:var(--muted);max-width:460px;margin:0 auto 36px;line-height:1.65}
    .ph-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
    .btn-hero{background:var(--navy);color:#fff;border-radius:10px;padding:14px 30px;font-size:15px;font-weight:600}
    .btn-hero:hover{background:var(--navy-hover)}
    .btn-ghost{background:var(--surface);color:var(--navy);border:2px solid #e4e0d8;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:500}
    .btn-ghost:hover{background:#f3f1ec}
    .footer{background:var(--navy);padding:30px 60px;display:flex;align-items:center;justify-content:space-between}
    .footer .word{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:900;color:#fff;letter-spacing:-.01em}
    .footer .brand{gap:13px}
    .footer .copy{font-size:13px;color:rgba(255,255,255,.32)}
    .version{position:fixed;bottom:8px;right:12px;font-size:11px;color:#c9ccd1}
    @media (max-width:600px){.nav{padding:0 18px;height:60px}.nav-link,.nav-div{display:none}.nav-right{gap:16px}.ph-title{font-size:38px}.footer{padding:24px 18px;flex-direction:column;gap:14px;text-align:center}}
  </style>
</head>
<body>
<div id="reiw-site-header"></div>
<script>window.REIW_SITE_HEADER = { page: 'pricing' };</script>
<script src="/site-header.js"></script>
<main class="ph">
  <div class="eyebrow">Pricing</div>
  <h1 class="ph-title">Simple pricing,<br>coming soon.</h1>
  <p class="ph-desc">One plan, all six Studios. We're finalizing the details — in the meantime you can start using REIW free.</p>
  <div class="ph-cta">
    <a href="/login.html" class="btn-hero">Get started free</a>
    <a href="/" class="btn-ghost">← Back to home</a>
  </div>
</main>
<footer class="reiwf-footer">
  <a href="/" class="reiwf-brand"><svg width="28" height="18" viewBox="0 0 56 36" fill="none"><polyline points="2,34 13,8 23,21 34,2 45,15 54,5" stroke="rgba(255,255,255,0.35)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="34,2 45,15 54,5" stroke="#c4973b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="34" cy="2" r="4" fill="#c4973b"/></svg><span class="reiwf-word">REIW</span></a>
  <nav class="reiwf-links">
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms &amp; Conditions</a>
  </nav>
  <span class="reiwf-copy">&copy; <span id="reiw-year"></span> <span id="reiw-entity"></span></span>
</footer>
<script src="/footer.js"></script>
<div class="version">pricing v0.4</div>
</body>
</html>
